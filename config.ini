[paths]
# Ruta por SO (el script detecta automáticamente)
mis_output_dir_windows = C:\IGSCLOUD\Datos\GOES
mis_output_dir_mac = /Users/subgerenciagrijalva/CFE/CloudStation/Datos/GOES
# Carpeta de entrada para importación automática de .mis históricos
# Dejar archivos .mis aquí y se importan automáticamente
# Los procesados se mueven a subcarpeta 'procesados/', los fallidos a 'errores/'
mis_import_dir_windows = C:\IGSCLOUD\Datos\import
mis_import_dir_mac = /Users/subgerenciagrijalva/CFE/CloudStation/Datos/import
# Carpeta de entrada para importación automática de Excel FunVasos
# Dejar archivos .xlsx aquí y se parsean e importan automáticamente
# Los procesados se copian a doc_repo y se mueven a subcarpeta 'procesados/'
funvasos_inbox_windows = C:\IGSCLOUD\Datos\funvasos_inbox
funvasos_inbox_mac = /Users/subgerenciagrijalva/CFE/CloudStation/Datos/funvasos_inbox
# Carpeta del repositorio de documentos FunVasos (donde se archivan los Excel)
funvasos_repo_windows = C:\IGSCLOUD\DocumentRepository\funvasos
funvasos_repo_mac = /Users/subgerenciagrijalva/CFE/CloudStation/DocumentRepository/funvasos

[settings]
# Modo de SQL Server a usar: 'remoto' o 'local'
sql_mode = remoto
# Intervalo en minutos para recargar estaciones/sensores desde SQL Server
reload_interval_minutes = 5
# Intervalo en minutos para ejecutar recuperación automática de huecos
auto_recover_interval_minutes = 30
# Horas hacia atrás para buscar huecos en recuperación automática
auto_recover_hours = 12
# Intervalo en minutos para revisar carpeta de importación de .mis
auto_import_interval_minutes = 5
# Intervalo en minutos para revisar carpeta de FunVasos Excel
funvasos_import_interval_minutes = 5
# Reintentos por estación cuando no llegan datos en su TX programada
# Máximo de reintentos antes de desistir (se reintentará en la siguiente hora)
retry_max_intentos = 3
# Delays en minutos para cada reintento (separados por coma)
# Ejemplo: 2,5,10 = primer reintento a 2 min, segundo a 5 min, tercero a 10 min
retry_delays = 2,5,10
# Puerto del panel de monitoreo web (acceder en http://localhost:5555)
monitor_port = 5555
# Generar archivos .mis en tiempo real durante cada fetch GOES
# true = genera archivo .mis por cada mensaje recibido (respaldo local)
# false = solo inserta en TimescaleDB sin generar .mis
generar_mis = true
