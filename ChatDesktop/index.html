<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStation Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-logo">
                <svg width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#805ad5" opacity="0.2"/><path d="M20 36c0-8.8 5.4-16 12-16s12 7.2 12 16" stroke="#805ad5" stroke-width="3" fill="none"/><circle cx="32" cy="24" r="4" fill="#ce93d8"/><path d="M16 40h32" stroke="#805ad5" stroke-width="2"/><circle cx="20" cy="44" r="2" fill="#81c784"/><circle cx="32" cy="44" r="2" fill="#64b5f6"/><circle cx="44" cy="44" r="2" fill="#fbbf24"/></svg>
            </div>
            <h1 class="login-title">CloudStation Chat</h1>
            <p class="login-subtitle">Subgerencia Técnica Grijalva</p>
            
            <div class="form-group">
                <label>Servidor</label>
                <input type="text" id="serverUrl" placeholder="http://atlas16.ddns.net:5215" spellcheck="false">
            </div>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="usuario" autocomplete="username" spellcheck="false">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div id="loginError" class="error-msg" style="display:none;"></div>
            <button id="btnLogin" class="btn-primary" onclick="doLogin()">
                <span id="loginBtnText">Iniciar sesión</span>
                <span id="loginSpinner" class="spinner" style="display:none;"></span>
            </button>
        </div>
    </div>

    <!-- ==================== CHAT SCREEN ==================== -->
    <div id="chatScreen" class="screen">
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-header">
                <svg width="24" height="24" viewBox="0 0 64 64" style="vertical-align:middle;"><circle cx="32" cy="32" r="30" fill="#805ad5" opacity="0.3"/><circle cx="32" cy="24" r="4" fill="#ce93d8"/></svg>
                <span class="app-title">CloudStation</span>
                <button class="btn-icon" onclick="doLogout()" title="Cerrar sesión">⏻</button>
            </div>

            <div class="sidebar-section-title">Salas</div>
            <div id="roomList">
                <div class="room-item active" data-room="general" onclick="switchRoom('general')">
                    <span class="room-hash">#</span> General
                </div>
                <div class="room-item" data-room="operacion" onclick="switchRoom('operacion')">
                    <span class="room-hash" style="color:#fbbf24;">#</span> Operación
                </div>
                <div class="room-item" data-room="alertas" onclick="switchRoom('alertas')">
                    <span class="room-hash" style="color:#e74c3c;">#</span> Alertas
                </div>
                <div class="room-item" data-room="hidrologia" onclick="switchRoom('hidrologia')">
                    <span class="room-hash" style="color:#81c784;">#</span> Hidrología
                </div>
                <div class="room-item" data-room="centinela" onclick="switchRoom('centinela')">
                    <span class="room-hash">🤖</span> Centinela IA
                </div>
            </div>

            <div class="sidebar-section-title">✉ Mensajes Directos</div>
            <div id="dmList"></div>

            <div class="sidebar-section-title">📊 Reportes</div>
            <div>
                <div class="room-item" onclick="showRainfallReport('parcial')">
                    <span class="room-hash" style="color:#43a047;">🌧</span> Lluvia Parcial
                </div>
                <div class="room-item" onclick="showRainfallReport('24h')">
                    <span class="room-hash" style="color:#1565c0;">🌧</span> Lluvia 24h
                </div>
            </div>

            <div class="sidebar-section-title">En línea (<span id="onlineCount">0</span>)</div>
            <div id="onlineList"></div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <span class="online-dot">●</span>
                    <span id="currentUserDisplay">—</span>
                </div>
                <div class="conn-badge" id="connBadge">Desconectado</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div id="chatMain">
            <div id="chatHeader">
                <h3 id="roomTitle"># general</h3>
            </div>
            <div id="messageArea"></div>

            <div id="uploadProgress" style="display:none;">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <span class="progress-text" id="progressText">Subiendo...</span>
            </div>

            <div id="chatInputBar">
                <input type="file" id="fileInput" multiple style="display:none;">
                <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Adjuntar archivo">📎</button>
                <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off">
                <button class="btn-send" onclick="sendMessage()" title="Enviar">▶</button>
            </div>
        </div>
    </div>

    <script src="./node_modules/@microsoft/signalr/dist/browser/signalr.min.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
